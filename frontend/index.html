<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SweatLogic</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>SweatLogic</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="workout.html">Workout</a>
            <a href="progress.html">Progress</a>
            <a href="map.html">Map</a>
            <a href="settings.html">Settings</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2>Track Your Fitness Journey</h2>
            <p>Log workouts, monitor progress, and reach your goals.</p>
            <a href="javascript:void(0)" class="btn" onclick="showBMICalculator()">Get Started</a>
        </section>

        <section id="bmi-section" class="bmi-tool" style="display: none; max-width: 500px; margin: 40px auto; padding: 20px; background: #f9f9f9; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center;">
            <h3 style="color: #333333;">Quick Health Check</h3>
            <p>Enter your details to tailor your workouts.</p>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="name" placeholder="Name" style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                <input type="number" id="age" placeholder="Age" style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                <select id="gender" style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                    <option value="">Select gender</option>
                    <option value="Female">Female</option>
                    <option value="Male">Male</option>
                    <option value="Non-binary">Non-binary</option>
                    <option value="Prefer not to say">Prefer not to say</option>
                </select>
                <select id="goal" style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                    <option value="">Select goal</option>
                    <option value="Lose weight">Lose weight</option>
                    <option value="Gain muscle">Gain muscle</option>
                    <option value="Maintain">Maintain</option>
                    <option value="Improve endurance">Improve endurance</option>
                </select>
                <input type="number" id="weight" placeholder="Weight (kg)" style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                <input type="number" id="height" placeholder="Height (cm)" style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                <button onclick="calculateBMI()" class="btn">Calculate Now</button>
            </div>
            <p id="bmi-result" style="margin-top: 15px; font-size: 1.1em; font-weight: bold; color: #d65a6d;"></p>
            <p id="workout-recommendation" style="margin-top: 10px; font-style: italic; color: #555;"></p>
            <a href="dashboard.html" style="display: block; margin-top: 15px; font-size: 0.9em; color: #666;">Skip to Dashboard</a>
            <a href="javascript:void(0)" style="display: block; margin-top: 15px; font-size: 0.9em; color: #666;" onclick="clearProfile()">Clear Profile</a>
        </section>
        </main>
        
    </main>

    <script src="js/main.js"></script>
</body>
</html>
