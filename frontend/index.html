<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SweatLogic</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>SweatLogic</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="workout.html">Workout</a>
            <a href="progress.html">Progress</a>
            <a href="map.html">Map</a>
            <a href="settings.html">Settings</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2>Track Your Fitness Journey</h2>
            <p>Log workouts, monitor progress, and reach your goals.</p>
            <a href="javascript:void(0)" class="btn" onclick="showBMICalculator()">Get Started</a>
        </section>

        <section id="bmi-section" class="bmi-tool" style="display: none; max-width: 400px; margin: 40px auto; padding: 20px; background: #f9f9f9; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center;">
            <h3 style="color: #333333;">Quick Health Check</h3>
            <p>Enter your details to tailor your workouts.</p>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="number" id="weight" placeholder="Weight (kg)" style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                <input type="number" id="height" placeholder="Height (cm)" style="padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                <button onclick="calculateBMI()" style="padding: 12px; background-color: #d65a6d; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Calculate Now</button>
            </div>
            <p id="bmi-result" style="margin-top: 15px; font-size: 1.1em; font-weight: bold; color: #d65a6d;"></p>      
            <a href="dashboard.html" style="display: block; margin-top: 15px; font-size: 0.9em; color: #666;">Skip to Dashboard</a>
            </section>
        </main>
        
    </main>

    <script src="js/main.js"></script>
</body>
</html>
